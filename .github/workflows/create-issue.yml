# Nombre descriptivo del workflow
name: Create Issue from Web Form

# Trigger
on:
  repository_dispatch:
    types: [new-actor-proposal]

# Trabajos
jobs:
  create_issue_job:
    name: Create GitHub Issue Job
    runs-on: ubuntu-latest
    steps:
      # ---------- PASO NUEVO AÑADIDO ----------
      # Descarga el código del repositorio al workspace de la Action
      # Soluciona el error "ISSUE_TEMPLATE.md could not be found"
      - name: Checkout Repository
        uses: actions/checkout@v4 # Usamos la versión 4 que es la más reciente

      # ------------------------------------------

      # Paso 1 (anterior): Formatear título y cuerpo
      - name: Format Issue Content
        id: format
        run: |
          # Script bash para extraer datos y formatear (SIN CAMBIOS INTERNOS)
          NAME="${{ github.event.client_payload.name }}"
          TYPE="${{ github.event.client_payload.type }}"
          CITY="${{ github.event.client_payload.city }}"
          COUNTRY="${{ github.event.client_payload.country }}"
          LAT="${{ github.event.client_payload.lat }}"
          LNG="${{ github.event.client_payload.lng }}"
          DESC="${{ github.event.client_payload.description }}"
          ISSUE_TITLE="Propuesta Nuevo Actor: $NAME"
          ISSUE_BODY=$(cat <<EOF
          **Nueva Propuesta de Actor Recibida desde el Formulario Web:**

          * **Nombre:** $NAME
          * **Tipo:** $TYPE
          * **Ciudad:** $CITY
          * **País:** $COUNTRY
          * **Latitud:** \`$LAT\`
          * **Longitud:** \`$LNG\`
          * **Descripción:**
              >$DESC

          ---
          *Por favor, revisar y verificar esta información antes de añadirla a \`data/cardano-actors.json\`.*
          EOF
          )
          ISSUE_BODY="${ISSUE_BODY//'%'/'%25'}"
          ISSUE_BODY="${ISSUE_BODY//$'\n'/'%0A'}"
          ISSUE_BODY="${ISSUE_BODY//$'\r'/'%0D'}"
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_body=$ISSUE_BODY" >> $GITHUB_OUTPUT
        shell: bash

      # Paso 2 (anterior): Crear el Issue (asegurando inputs correctos)
      - name: Create GitHub Issue
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Aseguramos que los nombres de input sean 'title' y 'body'
          title: ${{ steps.format.outputs.issue_title }} # Correcto
          body: ${{ steps.format.outputs.issue_body }}   # Correcto
          # labels: new-proposal, needs-review # Optional