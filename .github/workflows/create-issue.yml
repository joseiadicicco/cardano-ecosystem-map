# Nombre descriptivo del workflow
name: Create Issue from Web Form

# Trigger
on:
  repository_dispatch:
    types: [new-actor-proposal]

# Trabajos
jobs:
  create_issue_job:
    name: Create GitHub Issue Job
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Hacer checkout del código (Importante aunque no usemos template ahora)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Paso 2: Formatear título y cuerpo (Igual que antes)
      - name: Format Issue Content
        id: format
        run: |
          # Script bash para extraer datos y formatear
          NAME="${{ github.event.client_payload.name }}"
          TYPE="${{ github.event.client_payload.type }}"
          CITY="${{ github.event.client_payload.city }}"
          COUNTRY="${{ github.event.client_payload.country }}"
          LAT="${{ github.event.client_payload.lat }}"
          LNG="${{ github.event.client_payload.lng }}"
          DESC="${{ github.event.client_payload.description }}"
          ISSUE_TITLE="Propuesta Nuevo Actor: $NAME"
          ISSUE_BODY=$(cat <<EOF
          **Nueva Propuesta de Actor Recibida desde el Formulario Web:**

          * **Nombre:** $NAME
          * **Tipo:** $TYPE
          * **Ciudad:** $CITY
          * **País:** $COUNTRY
          * **Latitud:** \`$LAT\`
          * **Longitud:** \`$LNG\`
          * **Descripción:**
              >$DESC

          ---
          *Por favor, revisar y verificar esta información antes de añadirla a \`data/cardano-actors.json\`.*
          EOF
          )
          # Preparamos outputs escapando caracteres
          ISSUE_BODY="${ISSUE_BODY//'%'/'%25'}"
          ISSUE_BODY="${ISSUE_BODY//$'\n'/'%0A'}"
          ISSUE_BODY="${ISSUE_BODY//$'\r'/'%0D'}"
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_body=$ISSUE_BODY" >> $GITHUB_OUTPUT
        shell: bash

      # ---------- PASO MODIFICADO/NUEVO ----------
      # Paso 3: Crear el Issue usando GitHub CLI (gh)
      - name: Create GitHub Issue using gh CLI
        env:
          # ---------- CAMBIO AQUÍ ----------
          # Usamos el PAT específico que guardamos como secret, en lugar del token por defecto
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_PAT }}
          # ---------------------------------
          ISSUE_TITLE: ${{ steps.format.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.format.outputs.issue_body }}
        run: |
          # El comando gh usa GITHUB_TOKEN para autenticarse
          gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY"
        shell: bash