<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Ecosistema Cardano</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos básicos para que el globo ocupe espacio mientras configuramos */
        body { margin: 0; }
        #globeViz { width: 100vw; height: 100vh; } /* Ocupa toda la ventana */
    </style>
</head>
<body></body>
    <div id="globeViz"></div>

    <div id="settings-icon">⚙️</div>

    <div id="form-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>  <h2>Proponer Nuevo Actor</h2>
            <form id="actor-form">
                <div style="margin-bottom: 10px;">
                    <label for="form-name">Nombre del Actor:</label><br>
                    <input type="text" id="form-name" name="name" required style="width: 95%;">
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-type">Tipo de Actor:</label><br>
                    <select id="form-type" name="type" required>
                        <option value="">Selecciona un tipo...</option>
                        <option value="Ambassador">Ambassador</option>
                        <option value="Project">Project</option>
                        <option value="Hub">Hub</option>
                        <option value="University">University</option>
                        <option value="Founder">Founder</option>
                        </select>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-city">Ciudad:</label><br>
                    <input type="text" id="form-city" name="city" required>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-country">País:</label><br>
                    <input type="text" id="form-country" name="country" required>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-lat">Latitud:</label><br>
                    <input type="number" step="any" id="form-lat" name="lat" required placeholder="Ej: -34.6037">
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-lng">Longitud:</label><br>
                    <input type="number" step="any" id="form-lng" name="lng" required placeholder="Ej: -58.3816">
                    <small>(Puedes obtenerlas de Google Maps)</small>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="form-description">Descripción Breve:</label><br>
                    <textarea id="form-description" name="description" rows="3" required style="width: 95%;"></textarea>
                </div>

                <button type="submit">Enviar Propuesta</button>
            </form>
        </div>
    </div>

    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/globe.gl"></script>
    <script src="script.js"></script>
</body>
</html>
